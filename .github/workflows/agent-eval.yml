name: Agent Eval

on:
  pull_request:
    paths:
      - "agents/*/system-prompt.md"
      - "skills/**"
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent name to evaluate (e.g. akinator)"
        required: true
        default: "akinator"
      min_success_rate:
        description: "Minimum success rate for first-run pass"
        required: false
        default: "50"
      max_avg_iterations:
        description: "Maximum average iterations for first-run pass"
        required: false
        default: "30"
      concurrency:
        description: "Number of eval games to run in parallel"
        required: false
        default: "5"

# Least privilege: write only what the eval needs (commit score + mark PR ready).
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: agent-eval-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      count:  ${{ steps.find.outputs.count }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
        with:
          fetch-depth: 0

      - id: find
        env:
          EVENT_NAME:    ${{ github.event_name }}
          DISPATCH_NAME: ${{ github.event.inputs.agent_name }}
          BASE_SHA:      ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:      ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            matrix=$(python3 -c "import json,sys,os; name=os.environ['DISPATCH_NAME'].strip(); print(json.dumps([f'agents/{name}']))")
          else
            changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
            matrix=$(printf '%s' "$changed" | python3 -c "import sys,json,re,os;changed=[l.strip() for l in sys.stdin if l.strip()];dirs={m.group(1) for l in changed for m in [re.match(r'^(agents/[^/]+)/',l)] if m};skills_changed=any(re.match(r'^skills/',l) for l in changed);all_agents={f'agents/{d}' for d in os.listdir('agents') if os.path.isdir(f'agents/{d}')} if skills_changed else set();print(json.dumps(sorted(dirs|all_agents)))")
          fi
          count=$(printf '%s' "$matrix" | python3 -c 'import sys,json;print(len(json.load(sys.stdin)))')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count"   >> "$GITHUB_OUTPUT"
          echo "Agent folders to evaluate: $matrix"

  eval:
    needs: detect
    if: ${{ needs.detect.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent_folder: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      # Derive agent name (e.g. "akinator") and its uppercase form (e.g. "AKINATOR")
      # used to resolve the agent-specific webhook secret.
      - id: agent_id
        run: |
          name=$(echo "${{ matrix.agent_folder }}" | sed 's|^agents/||')
          upper=$(echo "$name" | tr '[:lower:]-' '[:upper:]_')
          echo "name=$name"   >> "$GITHUB_OUTPUT"
          echo "upper=$upper" >> "$GITHUB_OUTPUT"

      # Fail fast if the agent-specific webhook secret is not configured.
      # Secret convention: N8N_AGENT_<AGENTNAME_UPPER>_WEBHOOK_URL
      # e.g. agents/akinator → N8N_AGENT_AKINATOR_WEBHOOK_URL
      - id: check_secret
        env:
          WEBHOOK_URL: ${{ secrets[format('N8N_AGENT_{0}_WEBHOOK_URL', steps.agent_id.outputs.upper)] }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠️  Secret N8N_AGENT_${{ steps.agent_id.outputs.upper }}_WEBHOOK_URL is not set."
            echo "   Add it under Settings → Secrets and variables → Actions, then re-run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "url="      >> "$GITHUB_OUTPUT"
          else
            echo "skip=false"        >> "$GITHUB_OUTPUT"
            printf 'url=%s\n' "$WEBHOOK_URL" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # actions/setup-node v4
        if: steps.check_secret.outputs.skip == 'false'
        with:
          node-version-file: agent-eval/.nvmrc
          cache: "npm"
          cache-dependency-path: agent-eval/package-lock.json

      - name: Install dependencies
        if: steps.check_secret.outputs.skip == 'false'
        run: npm ci
        working-directory: agent-eval

      - name: Report eval start
        if: steps.check_secret.outputs.skip == 'false'
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          OWNER:     ${{ github.repository_owner }}
          REPO:      ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL:   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AGENT:     ${{ matrix.agent_folder }}
          BRANCH:    ${{ github.head_ref || github.ref_name }}
          CONCUR:    ${{ github.event.inputs.concurrency || '5' }}
        run: |
          set -euo pipefail
          {
            echo "## ⏳ Agent eval — running"
            echo ""
            echo "**Agent:** \`${AGENT}\`  "
            echo "**Ref:** \`${BRANCH}\`${PR_NUMBER:+ · PR #${PR_NUMBER}}  "
            echo "**Concurrency:** ${CONCUR}  "
            echo "**Run:** [View live logs →](${RUN_URL})"
            echo ""
            echo "_Results will appear below once the eval finishes._"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${PR_NUMBER:-}" ]; then
            body=$(printf '⏳ **Agent eval running** — `%s`\n\nConcurrency: %s · Branch: `%s`\n[View live logs →](%s)' \
              "$AGENT" "$CONCUR" "$BRANCH" "$RUN_URL")
            comment_id=$(gh api "repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST -f body="$body" --jq '.id' 2>/dev/null || echo "")
            echo "${comment_id:-}" > /tmp/eval-comment-id.txt
          fi

      - name: Run eval
        if: steps.check_secret.outputs.skip == 'false'
        working-directory: agent-eval
        env:
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          N8N_AGENT_WEBHOOK_URL: ${{ steps.check_secret.outputs.url }}
          OWNER:                ${{ github.repository_owner }}
          REPO:                 ${{ github.event.repository.name }}
          AGENT_FOLDER:         ${{ matrix.agent_folder }}
          BRANCH:               ${{ github.head_ref || github.ref_name }}
          PR_NUMBER:            ${{ github.event.pull_request.number }}
          MIN_SUCCESS_RATE:     ${{ github.event.inputs.min_success_rate || '50' }}
          MAX_AVG_ITERATIONS:   ${{ github.event.inputs.max_avg_iterations || '30' }}
          CONCURRENCY:          ${{ github.event.inputs.concurrency || '5' }}
          FAIL_ON_REGRESSION:   "false"
        run: npm run eval | tee /tmp/eval-out.txt; exit "${PIPESTATUS[0]}"

      - name: Report eval result
        if: always() && steps.check_secret.outputs.skip == 'false'
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          OWNER:     ${{ github.repository_owner }}
          REPO:      ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL:   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AGENT:     ${{ matrix.agent_folder }}
        run: |
          set -euo pipefail
          result_line=$(grep '^EVAL_RESULT_JSON ' /tmp/eval-out.txt 2>/dev/null | tail -1 || echo "")
          if [ -z "$result_line" ]; then
            verdict="❌ eval did not complete"
            detail="Check the [run logs](${RUN_URL}) for errors."
          else
            result_json="${result_line#EVAL_RESULT_JSON }"
            improved=$(echo "$result_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('improved') else 'false')")
            rate=$(echo "$result_json"     | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['stats']['success_rate'])")
            iters=$(echo "$result_json"    | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['stats']['avg_iterations'])")
            games=$(echo "$result_json"    | python3 -c "import sys,json; d=json.load(sys.stdin); s=d['stats']; print(f\"{s['successful_games']}/{s['total_games']}\")")
            if [ "$improved" = "true" ]; then
              verdict="✅ passed"
            else
              verdict="❌ did not improve"
            fi
            detail="Success rate: **${rate}%** · Avg iterations: **${iters}** · Games: **${games}**"
          fi

          if [ -n "${PR_NUMBER:-}" ] && [ -f /tmp/eval-comment-id.txt ]; then
            comment_id=$(cat /tmp/eval-comment-id.txt)
            if [ -n "$comment_id" ]; then
              body=$(printf '%s — `%s`\n\n%s\n[View run →](%s)' \
                "$verdict" "$AGENT" "$detail" "$RUN_URL")
              gh api "repos/${OWNER}/${REPO}/issues/comments/${comment_id}" \
                --method PATCH -f body="$body" > /dev/null 2>&1 || true
            fi
          fi
