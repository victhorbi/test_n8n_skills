name: Auto-trigger Analyze & Improve

# Fires whenever a new eval log is committed to main.
# When the log count for an agent crosses the configured threshold,
# it calls the n8n analyze-and-improve webhook for that agent.
#
# Required secrets:
#   N8N_ANALYZE_WEBHOOK_URL  — the n8n webhook URL for analyze-and-improve.json
#                              (Settings → n8n → Webhook Trigger → Production URL)
#
# Optional repo variable (Settings → Variables → Actions):
#   ANALYZE_SESSIONS_THRESHOLD  — minimum sessions before triggering (default: 5)

on:
  push:
    branches: [main]
    paths:
      - "agents/*/evals/logs/*.json"

permissions:
  contents: read

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
        with:
          fetch-depth: 2  # need HEAD~1 for before/after counts

      - name: Count sessions per agent and trigger analysis
        env:
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          N8N_WEBHOOK_URL:       ${{ secrets.N8N_ANALYZE_WEBHOOK_URL }}
          THRESHOLD:             ${{ vars.ANALYZE_SESSIONS_THRESHOLD || '5' }}
          OWNER:                 ${{ github.repository_owner }}
          REPO:                  ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "$N8N_WEBHOOK_URL" ]; then
            echo "N8N_ANALYZE_WEBHOOK_URL is not set — skipping."
            exit 0
          fi

          # Agents whose log folder changed in this push
          changed_agents=$(git diff --name-only HEAD~1 HEAD \
            | grep '^agents/[^/]*/evals/logs/.*\.json$' \
            | sed 's|^\(agents/[^/]*\)/.*|\1|' \
            | sort -u || true)

          if [ -z "$changed_agents" ]; then
            echo "No agent log changes detected."
            exit 0
          fi

          # Discover skill paths (comma-separated list of skills/*.md, excluding README)
          skills=$(git ls-files 'skills/*.md' | grep -vi 'readme' | paste -sd ',' - || true)

          while IFS= read -r agent_folder; do
            [ -z "$agent_folder" ] && continue

            # Total logs now and before this push
            total_now=$(git ls-files "${agent_folder}/evals/logs/" | grep '\.json$' | wc -l | tr -d ' ')
            added_this_push=$(git diff --name-only HEAD~1 HEAD \
              | grep "^${agent_folder}/evals/logs/.*\.json$" | wc -l | tr -d ' ')
            total_before=$((total_now - added_this_push))

            echo "${agent_folder}: ${total_before} → ${total_now} sessions (threshold: ${THRESHOLD})"

            # Only trigger when the count crosses the threshold from below
            if [ "$total_before" -lt "$THRESHOLD" ] && [ "$total_now" -ge "$THRESHOLD" ]; then
              agent_name=$(echo "$agent_folder" | sed 's|agents/||')
              system_prompt_path="${agent_folder}/system-prompt.md"

              echo "✓ Threshold crossed for ${agent_folder} — calling analyze-and-improve"

              payload=$(python3 -c "
import json, os
print(json.dumps({
  'owner':               os.environ['OWNER'],
  'repo':                os.environ['REPO'],
  'agent_folder':        os.environ['AGENT_FOLDER'],
  'system_prompt_path':  os.environ['SYSTEM_PROMPT_PATH'],
  'skills_paths':        os.environ['SKILLS'],
  'base_branch':         'main',
  'github_token':        os.environ['GITHUB_TOKEN'],
  'max_logs':            int(os.environ['THRESHOLD']),
}))" \
                AGENT_FOLDER="$agent_folder" \
                SYSTEM_PROMPT_PATH="$system_prompt_path" \
                SKILLS="$skills")

              http_status=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "$N8N_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "$payload")

              if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
                echo "  → n8n webhook accepted (HTTP ${http_status})"
              else
                echo "  ✗ n8n webhook returned HTTP ${http_status}"
                exit 1
              fi
            else
              echo "  Threshold not yet crossed — nothing to do."
            fi
          done <<< "$changed_agents"
