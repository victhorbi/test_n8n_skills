name: Auto-trigger Analyze & Improve

# Fires whenever a new eval log is committed to main.
# When the log count for an agent crosses the configured threshold,
# it calls the n8n analyze-and-improve webhook for that agent.
#
# Required secrets:
#   N8N_ANALYZE_WEBHOOK_URL  — the n8n webhook URL for analyze-and-improve.json
#                              (Settings → n8n → Webhook Trigger → Production URL)
#
# Optional repo variable (Settings → Variables → Actions):
#   ANALYZE_SESSIONS_THRESHOLD  — minimum sessions before triggering (default: 5)

on:
  push:
    branches: [main]
    paths:
      - "agents/*/evals/logs/*.json"
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent name to analyze (e.g. akinator)"
        required: true
        default: "akinator"
      max_logs:
        description: "Number of recent logs to include"
        required: false
        default: "5"

permissions:
  contents: read

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
        with:
          fetch-depth: 2  # need HEAD~1 for before/after counts on push

      - name: Count sessions per agent and trigger analysis
        env:
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          N8N_WEBHOOK_URL:       ${{ secrets.N8N_ANALYZE_WEBHOOK_URL }}
          THRESHOLD:             ${{ vars.ANALYZE_SESSIONS_THRESHOLD || '5' }}
          OWNER:                 ${{ github.repository_owner }}
          REPO:                  ${{ github.event.repository.name }}
          EVENT_NAME:            ${{ github.event_name }}
          DISPATCH_AGENT:        ${{ github.event.inputs.agent_name }}
          DISPATCH_MAX_LOGS:     ${{ github.event.inputs.max_logs || '5' }}
        run: |
          set -euo pipefail

          if [ -z "$N8N_WEBHOOK_URL" ]; then
            echo "N8N_ANALYZE_WEBHOOK_URL is not set — skipping."
            exit 0
          fi

          # Discover skill paths (comma-separated list of skills/*.md, excluding README)
          skills=$(git ls-files 'skills/*.md' | grep -vi 'readme' | paste -sd ',' - || true)

          fire() {
            local agent_folder="$1"
            local max_logs="$2"
            local system_prompt_path="${agent_folder}/system-prompt.md"

            payload=$(jq -n \
              --arg owner               "$OWNER" \
              --arg repo                "$REPO" \
              --arg agent_folder        "$agent_folder" \
              --arg system_prompt_path  "$system_prompt_path" \
              --arg skills_paths        "$skills" \
              --arg base_branch         "main" \
              --arg github_token        "$GITHUB_TOKEN" \
              --argjson max_logs        "${max_logs:-5}" \
              '{owner: $owner, repo: $repo, agent_folder: $agent_folder,
                system_prompt_path: $system_prompt_path, skills_paths: $skills_paths,
                base_branch: $base_branch, github_token: $github_token, max_logs: $max_logs}')

            http_status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$N8N_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload")

            if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
              echo "  → n8n webhook accepted (HTTP ${http_status})"
            else
              echo "  ✗ n8n webhook returned HTTP ${http_status}"
              exit 1
            fi
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            agent_folder="agents/${DISPATCH_AGENT}"
            echo "Manual dispatch — firing for ${agent_folder} (max_logs=${DISPATCH_MAX_LOGS})"
            fire "$agent_folder" "$DISPATCH_MAX_LOGS"
            exit 0
          fi

          # push path: only fire when log count crosses the threshold from below
          changed_agents=$(git diff --name-only HEAD~1 HEAD \
            | grep '^agents/[^/]*/evals/logs/.*\.json$' \
            | sed 's|^\(agents/[^/]*\)/.*|\1|' \
            | sort -u || true)

          if [ -z "$changed_agents" ]; then
            echo "No agent log changes detected."
            exit 0
          fi

          while IFS= read -r agent_folder; do
            [ -z "$agent_folder" ] && continue

            total_now=$(git ls-files "${agent_folder}/evals/logs/" | grep '\.json$' | wc -l | tr -d ' ')
            added_this_push=$(git diff --name-only HEAD~1 HEAD \
              | grep "^${agent_folder}/evals/logs/.*\.json$" | wc -l | tr -d ' ')
            total_before=$((total_now - added_this_push))

            echo "${agent_folder}: ${total_before} → ${total_now} sessions (threshold: ${THRESHOLD})"

            if [ "$total_before" -lt "$THRESHOLD" ] && [ "$total_now" -ge "$THRESHOLD" ]; then
              echo "✓ Threshold crossed — calling analyze-and-improve"
              fire "$agent_folder" "$THRESHOLD"
            else
              echo "  Threshold not yet crossed — nothing to do."
            fi
          done <<< "$changed_agents"
